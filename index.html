<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<!-- Open Graph buat WhatsApp -->
<meta property="og:title" content="Ada sesuatu buat kamu">
<meta property="og:description" content="Boleh minta 30 detik waktunya nggak?">
<meta property="og:image" content="https://semb-commits.github.io/Untukmu-nih/IMG-20260614-WA0022.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta property="og:url" content="https://semb-commits.github.io/Untukmu-nih/">

<!-- WhatsApp kadang butuh ini juga -->
<meta name="twitter:card" content="summary_large_image">

<!-- AOS CSS -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=DM+Mono:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: transparent;
  }

.bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('IMG-20260614-WA0022.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.5);
    z-index: -1;
  }

.slide {
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(10px);
    padding: 45px 35px;
    border-radius: 20px;
    text-align: left;
    max-width: 420px;
    color: white;
    display: none;
  }

.slide.active { display: block; }

  h2 {
    font-size: 32px;
    margin-bottom: 20px;
    font-weight: 600;
  }

  p {
    font-size: 20px;
    line-height: 1.7;
    margin-bottom: 30px;
    font-family: 'DM Mono', monospace;
    min-height: 60px;
  }

.btn-group {
    display: flex;
    gap: 15px;
    justify-content: flex-start;
    position: relative;
  }

  button {
    background: #ff6b81;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 17px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 600;
  }

  button:hover {
    transform: translateY(-2px);
  }

  #btnTidak {
    position: absolute;
    background: #555;
  }

.cursor {
    display: inline-block;
    width: 2px;
    height: 22px;
    background: white;
    animation: blink 0.7s infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<audio id="musik" loop>
  <source src="Sabar%20-%20Sadewok%20Official%20Music%20Video.mp3" type="audio/mpeg">
</audio>

<!-- Halaman 1 -->
<div class="slide active" id="slide1" data-aos="fade-up">
  <h2 data-aos="fade-up" data-aos-delay="200">Hai...</h2>
  <p id="text1"></p>
  <button onclick="nextSlide(1)" data-aos="fade-up" data-aos-delay="600">Lanjut</button>
</div>

<!-- Halaman 2 -->
<div class="slide" id="slide2" data-aos="fade-up">
  <h2 data-aos="fade-up" data-aos-delay="200">Jadi gini</h2>
  <p id="text2"></p>
  <button onclick="nextSlide(2)" data-aos="fade-up" data-aos-delay="600">Lanjut lagi</button>
</div>

<!-- Halaman 3 -->
<div class="slide" id="slide3" data-aos="fade-up">
  <h2 data-aos="fade-up" data-aos-delay="200">Pertanyaan terakhir</h2>
  <p id="text3"></p>
  <div class="btn-group" data-aos="fade-up" data-aos-delay="600">
    <button onclick="kirimWA('Mau')">Mau</button>
    <button id="btnTidak">Tidak Mau</button>
  </div>
</div>

<!-- AOS JS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({ duration: 800, once: true });

const musik = document.getElementById('musik');
const btnTidak = document.getElementById('btnTidak');

const texts = {
 1: "Boleh minta waktu bentar nggak? Cuma 30 detik kok.",
 2: "Aku nggak pinter ngomong langsung. Makanya aku bikin ini biar lebih enak bacanya.",
 3: "Kalau aku ajak ngobrol lebih sering, kamu mau nggak?"
};

document.body.addEventListener('click', () => {
  musik.play().catch(()=>{});
}, { once: true });

function typeWriter(text, elementId, speed = 50, callback) {
  let i = 0;
  const element = document.getElementById(elementId);
  element.innerHTML = '';
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      element.innerHTML += '<span class="cursor"></span>';
      if (callback) callback();
    }
  }
  typing();
}

window.onload = () => {
  startTyping(1);
}

function startTyping(slideNum) {
  typeWriter(texts[slideNum], 'text' + slideNum);
}

function nextSlide(n) {
  document.getElementById('slide' + n).classList.remove('active');
  document.getElementById('slide' + (n+1)).classList.add('active');
  startTyping(n+1);
}

btnTidak.addEventListener('mouseover', moveButton);
btnTidak.addEventListener('touchstart', moveButton);

function moveButton() {
  const btnRect = btnTidak.getBoundingClientRect();
  const maxX = window.innerWidth - btnRect.width - 20;
  const maxY = window.innerHeight - btnRect.height - 20;
  const x = Math.random() * maxX;
  const y = Math.random() * maxY;
  btnTidak.style.left = x + 'px';
  btnTidak.style.top = y + 'px';
  btnTidak.style.position = 'fixed';
}

function kirimWA(pesan) {
  const nomor = '62895351432524';
  const text = encodeURIComponent(pesan);
  window.open(`https://wa.me/${nomor}?text=${text}`, '_blank');
}
</script>

</body>
   </html>
